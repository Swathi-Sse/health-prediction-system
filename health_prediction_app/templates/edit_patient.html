<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Patient</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/">🏥 HealthPredict AI</a>
    </div>
</nav>

<div class="container main-container">

    <div class="card app-card shadow-sm">
        <div class="card-header">
            ✏️ Edit Patient
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label>Full Name</label>
                        <input type="text" name="fullname" value="{{ patient[1] }}" class="form-control" required minlength="3">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Date of Birth</label>
                        <input type="date" name="dob" value="{{ patient[2] }}" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ patient[3] }}" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Glucose</label>
                        <input type="number" name="glucose" value="{{ patient[4] }}" class="form-control" min="50" max="500" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Haemoglobin</label>
                        <input type="number" name="haemoglobin" value="{{ patient[5] }}" class="form-control" min="5" max="25" step="0.1" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Cholesterol</label>
                        <input type="number" name="cholesterol" value="{{ patient[6] }}" class="form-control" min="50" max="500" required>
                    </div>

                </div>

                <button type="submit" class="btn btn-warning px-4">
                    Update Patient
                </button>

                <a href="/" class="btn btn-secondary px-4">
                    Cancel
                </a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
